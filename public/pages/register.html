<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
  <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links" id="navbar-links">
    <li><a href="login.html" class="btn btn-sm btn-dark">Login</a></li>
  </ul>
</nav>

<div class="page-wrapper" style="display: flex; justify-content: center; align-items: flex-start;">
  <div class="card" style="width: 100%; max-width: 460px; margin-top: 20px;">
    <h2 style="margin-bottom: 20px;">Buat Akun</h2>
    <div id="alert-box"></div>
    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Nama Lengkap</label>
        <input class="form-control" type="text" id="name" name="name" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username" placeholder="johndoe" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email" placeholder="john@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div style="position: relative;">
          <input class="form-control" type="password" id="password" name="password" placeholder="Min. 8 karakter" required style="padding-right: 44px;" />
          <button type="button" onclick="togglePw('password','eye-reg-pw')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;">
            <svg id="eye-reg-pw" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Konfirmasi Password</label>
        <div style="position: relative;">
          <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" required style="padding-right: 44px;" />
          <button type="button" onclick="togglePw('confirmPassword','eye-reg-cpw')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;">
            <svg id="eye-reg-cpw" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Daftar Sekarang</button>
    </form>
    <p style="margin-top: 16px; text-align: center; font-size: 0.9rem;">Sudah punya akun? <a href="login.html" style="font-weight: 800;">Login di sini</a></p>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script>
function togglePw(inputId, svgId) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  document.getElementById(svgId).style.opacity = isHidden ? '0.5' : '1';
}
</script>
<script src="../js/register.js"></script>
</body>
</html>
