<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Prediksi — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
  <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links" id="navbar-links">
    <li><a href="dashboard.html" class="btn btn-sm btn-secondary">Dashboard</a></li>
    <li><a href="predict.html" class="btn btn-sm btn-primary">+ Prediksi</a></li>
    <li><a href="#" id="logout-btn" class="btn btn-sm btn-dark">Logout</a></li>
  </ul>
</nav>

<div class="page-wrapper">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
      <h2>Riwayat Prediksi</h2>
      <div style="display:flex; gap: 10px; flex-wrap: wrap;">
        <button id="delete-all" class="btn btn-danger btn-sm" disabled>Hapus Semua</button>
        <button id="export-csv" class="btn btn-secondary btn-sm" disabled>Export CSV</button>
        <button id="export-pdf" class="btn btn-dark btn-sm" disabled>Export PDF</button>
      </div>
    </div>

    <div id="empty-state" style="display:none; text-align:center; padding: 40px;">
      <p style="font-weight: 700; margin-bottom: 16px;">Belum ada riwayat prediksi.</p>
      <a href="predict.html" class="btn btn-primary">Mulai Prediksi</a>
    </div>

    <div id="table-section" style="display:none;">
      <div class="table-wrapper">
        <table class="nb-table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nama</th>
              <th>Burnout</th>
              <th>Confidence</th>
              <th>Jam Kerja</th>
              <th>Tidur</th>
              <th>Kafein</th>
              <th>Bug</th>
              <th>Rapat</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/history.js"></script>
</body>
</html>
