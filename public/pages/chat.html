<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    .chat-page { display: flex; flex-direction: column; height: calc(100vh - 60px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: var(--white); border-bottom: 3px solid #000; }
    .chat-input-bar { display: flex; gap: 10px; padding: 16px 24px; background: var(--yellow); border-top: 3px solid #000; }
    .chat-input-bar input { flex: 1; }
    .msg-meta { font-size: 0.72rem; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
  <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links" id="navbar-links">
    <li><a href="dashboard.html" class="btn btn-sm btn-secondary">Dashboard</a></li>
    <li><button id="clear-btn" class="btn btn-sm btn-danger">Hapus Riwayat</button></li>
    <li><a href="#" id="logout-btn" class="btn btn-sm btn-dark">Logout</a></li>
  </ul>
</nav>

<div class="chat-page">
  <div class="chat-messages" id="chat-messages">
    <div style="text-align:center; color:#888; font-size:0.85rem; padding: 20px 0;">Mulai percakapan tentang burnout</div>
  </div>
  <div class="chat-input-bar">
    <input class="form-control" type="text" id="chat-input" placeholder="Tanya sesuatu tentang burnout..." autocomplete="off" />
    <button class="btn btn-dark" id="send-btn">Kirim</button>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/chat.js"></script>
</body>
</html>
