<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lupa Password — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
</nav>

<div class="page-wrapper" style="display: flex; justify-content: center;">
  <div class="card" style="width: 100%; max-width: 420px; margin-top: 20px;">
    <h2 style="margin-bottom: 8px;">Lupa Password</h2>
    <p style="margin-bottom: 20px; font-size: 0.9rem;">Masukkan email akunmu. Kami akan mengirimkan kode OTP untuk reset password.</p>
    <div id="alert-box"></div>
    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" placeholder="john@example.com" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Kirim Kode OTP</button>
    </form>
    <p style="margin-top: 16px; text-align: center; font-size: 0.9rem;"><a href="login.html" style="font-weight: 800;">&larr; Kembali ke Login</a></p>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/forgot-password.js"></script>
</body>
</html>
