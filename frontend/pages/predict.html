<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prediksi Burnout — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
  <ul class="navbar-links">
    <li><a href="dashboard.html" class="btn btn-sm btn-secondary">Dashboard</a></li>
    <li><a href="#" id="logout-btn" class="btn btn-sm btn-dark">Logout</a></li>
  </ul>
</nav>

<div class="page-wrapper">
  <div class="container" style="max-width: 700px;">
    <h2 style="margin-bottom: 8px;">Prediksi Burnout</h2>
    <p style="margin-bottom: 24px; font-size: 0.9rem;">Isi data kebiasaan kerjamu untuk mendapatkan prediksi tingkat burnout.</p>

    <div id="alert-box"></div>

    <form id="predict-form" novalidate>
      <div class="form-group" style="margin-bottom: 18px;">
        <label class="form-label" for="nama">Nama (opsional)</label>
        <input class="form-control" type="text" id="nama" placeholder="Contoh: Mamat" />
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="age">Usia (18–80)</label>
          <input class="form-control" type="number" id="age" min="18" max="80" placeholder="25" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="experience_years">Pengalaman Kerja (0–50 tahun)</label>
          <input class="form-control" type="number" id="experience_years" min="0" max="50" placeholder="3" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="daily_work_hours">Jam Kerja/Hari (1–24)</label>
          <input class="form-control" type="number" id="daily_work_hours" min="1" max="24" step="0.5" placeholder="9" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="sleep_hours">Jam Tidur/Hari (1–12)</label>
          <input class="form-control" type="number" id="sleep_hours" min="1" max="12" step="0.5" placeholder="7" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="caffeine_intake">Konsumsi Kafein/Hari (0–20 cangkir)</label>
          <input class="form-control" type="number" id="caffeine_intake" min="0" max="20" placeholder="2" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="bugs_per_day">Bug per Hari (0–100)</label>
          <input class="form-control" type="number" id="bugs_per_day" min="0" max="100" placeholder="5" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="commits_per_day">Commit per Hari (0–100)</label>
          <input class="form-control" type="number" id="commits_per_day" min="0" max="100" placeholder="8" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="meetings_per_day">Rapat per Hari (0–20)</label>
          <input class="form-control" type="number" id="meetings_per_day" min="0" max="20" placeholder="3" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="screen_time">Screen Time/Hari (1–24 jam)</label>
          <input class="form-control" type="number" id="screen_time" min="1" max="24" step="0.5" placeholder="10" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="exercise_hours">Olahraga/Hari (0–12 jam)</label>
          <input class="form-control" type="number" id="exercise_hours" min="0" max="12" step="0.5" placeholder="0.5" required />
        </div>
      </div>
      <div style="display: flex; gap: 12px; margin-top: 8px;">
        <button type="button" id="reset-btn" class="btn btn-secondary">Reset Form</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">Prediksi Sekarang</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/predict.js"></script>
</body>
</html>
