<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
</nav>

<div class="page-wrapper" style="display: flex; justify-content: center;">
  <div class="card" style="width: 100%; max-width: 420px; margin-top: 20px;">
    <h2 style="margin-bottom: 20px;">Reset Password</h2>
    <div id="alert-box"></div>
    <form id="reset-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="otp">Kode OTP</label>
        <input class="form-control" type="text" id="otp" maxlength="6" placeholder="123456" inputmode="numeric" required style="letter-spacing: 6px; text-align: center;" />
      </div>
      <div class="form-group">
        <label class="form-label" for="newPassword">Password Baru</label>
        <input class="form-control" type="password" id="newPassword" placeholder="Min. 8 karakter" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Konfirmasi Password</label>
        <input class="form-control" type="password" id="confirmPassword" placeholder="Ulangi password baru" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Reset Password</button>
    </form>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/reset-password.js"></script>
</body>
</html>
