<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifikasi OTP — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
</nav>

<div class="page-wrapper" style="display: flex; justify-content: center;">
  <div class="card" style="width: 100%; max-width: 420px; margin-top: 20px;">
    <h2 style="margin-bottom: 8px;">Verifikasi Email</h2>
    <p style="margin-bottom: 20px; font-size: 0.9rem;">Kode OTP 6 digit telah dikirim ke email <strong id="email-display"></strong>.</p>
    <div id="alert-box"></div>
    <form id="verify-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="otp">Kode OTP</label>
        <input class="form-control" type="text" id="otp" maxlength="6" placeholder="123456" inputmode="numeric" required style="font-size: 1.5rem; letter-spacing: 8px; text-align: center;" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="verify-btn">Verifikasi</button>
    </form>
    <div style="margin-top: 16px; text-align: center;">
      <button id="resend-btn" class="btn btn-secondary btn-sm" disabled>Kirim Ulang OTP (<span id="countdown">60</span>s)</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/verify.js"></script>
</body>
</html>
