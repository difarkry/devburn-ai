<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BurnoutPredictor</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">BurnoutPredictor</a>
  <ul class="navbar-links">
    <li><a href="predict.html" class="btn btn-sm btn-primary">+ Prediksi Baru</a></li>
    <li><a href="chat.html" class="btn btn-sm btn-secondary">Chat</a></li>
    <li><a href="history.html" class="btn btn-sm btn-dark">Riwayat</a></li>
    <li><a href="#" id="logout-btn" class="btn btn-sm btn-dark">Logout</a></li>
  </ul>
</nav>

<div class="page-wrapper">
  <div class="container">
    <h2 style="margin-bottom: 24px;">Dashboard</h2>

    <div class="grid-3" style="margin-bottom: 28px;" id="stats-grid">
      <div class="stat-card card-yellow">
        <span class="stat-number" id="total-predictions">—</span>
        <span class="stat-label">Total Prediksi</span>
      </div>
      <div class="stat-card card-blue" id="last-level-card">
        <span class="stat-number" id="last-level">—</span>
        <span class="stat-label">Burnout Terakhir</span>
      </div>
      <div class="stat-card card-green">
        <span class="stat-number" id="last-confidence">—</span>
        <span class="stat-label">Confidence Terakhir</span>
      </div>
    </div>

    <div id="empty-state" style="display:none; text-align:center; padding: 40px;">
      <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;">Belum ada riwayat prediksi. Mulai prediksi pertamamu!</p>
      <a href="predict.html" class="btn btn-primary btn-lg">Mulai Prediksi</a>
    </div>

    <div id="history-section">
      <h3 style="margin-bottom: 16px;">Riwayat Terbaru</h3>
      <div class="table-wrapper">
        <table class="nb-table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Burnout Level</th>
              <th>Confidence</th>
              <th>Jam Kerja</th>
              <th>Tidur</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
